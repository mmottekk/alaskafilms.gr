<style>

/* nav */
.nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 36px; border-bottom: 0.5px solid rgba(232,230,224,0.12); }
.nav-links { display: flex; gap: 14px; align-items: center; }
.nav-links a { font-family: 'Rajdhani', system-ui, sans-serif; font-weight: 600; font-size: 16px; letter-spacing: .01em; color: rgba(255,255,255,.5); text-decoration: none; padding-bottom: 4px; border-bottom: 1.5px solid transparent; transition: color .25s ease, border-color .3s ease; display: inline-block; }
.nav-links a:hover { color: rgba(255,255,255,.88) !important; border-bottom-color: rgba(255,255,255,.25); transform: none; }
.nav-links a.active { color: rgba(255,255,255,.92); border-bottom-color: #8285d7; }
.nav-home { display: none; }
.nav-toggle { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
.nav-toggle span { display: block; width: 22px; height: 1.5px; background: rgba(255,255,255,.7); }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #212124; color: #e8e6e0; font-family: system-ui, sans-serif; }
a { text-decoration: none; }

.footer { padding: 22px 36px; display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid rgba(232,230,224,.15); }
.footer-copy { font-size: 10px; color: rgba(232,230,224,.8); letter-spacing: .08em; }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 10px; letter-spacing: .1em; color: rgba(232,230,224,.7); }

.page-header { padding: 40px 36px 0; }
.page-title { font-family: Georgia, serif; font-size: 28px; font-weight: 400; font-style: italic; color: #e8e6e0; margin-bottom: 24px; }
.tabs { display: flex; gap: 2px; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 10; background: #212124; padding: 12px 36px; border-bottom: 0.5px solid rgba(232,230,224,.08); margin-bottom: 0; }
.tab-btn { font-size: 11px; letter-spacing: .14em; color: rgba(255,255,255,.6); background: none; border: 0.5px solid rgba(255,255,255,.12); padding: 8px 20px; cursor: pointer; transition: all .2s; }
.tab-btn:hover { color: rgba(255,255,255,.7); border-color: rgba(255,255,255,.25); }
.tab-btn.active { color: #fff; border-color: rgba(175,169,236,.6); background: rgba(175,169,236,.08); }
.films-list { padding: 16px 36px 60px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.film-card { display: grid; grid-template-columns: 360px 1fr; gap: 0; border-bottom: 0.5px solid rgba(232,230,224,.15); padding: 40px 0; }
.film-card:first-child { padding-top: 0; }
.film-media { width: 360px; display: flex; flex-direction: column; gap: 6px; }
.media-slot { position: relative; width: 360px; height: 203px; overflow: hidden; cursor: pointer; }
.media-slot img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(.82) saturate(.88); transition: filter .25s; }
.media-slot:hover img { filter: brightness(.6) saturate(.7); }
.play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.play-circle { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.7); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.35); transition: background .25s, border-color .25s; }
.media-slot:hover .play-circle { background: rgba(130,133,215,.55); border-color: #8285d7; }
.play-tri-sm { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 12px solid rgba(255,255,255,.9); margin-left: 3px; }
.media-label { font-size: 10px; letter-spacing: .12em; color: rgba(232,230,224,.7); text-align: center; }
.media-label.active-label { color: #8285d7; cursor: pointer; }
.video-slot { display: none; position: relative; width: 360px; height: 203px; background: #212124; }
.video-slot iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.video-slot.visible { display: block; }
.media-slot.hidden { display: none; }

.film-body { padding: 0 0 0 36px; }
.film-meta-line { font-size: 10px; letter-spacing: .14em; color: rgba(232,230,224,.75); margin-bottom: 8px; }
.film-title { font-family: Georgia, serif; font-size: 24px; font-weight: 400; font-style: italic; color: #e8e6e0; margin-bottom: 14px; }
.film-synopsis { font-size: 13px; color: rgba(232,230,224,.75); line-height: 1.75; margin-bottom: 20px; }
.film-credits { font-size: 11px; border-collapse: collapse; margin-bottom: 16px; width: 100%; }
.cr-label { color: rgba(232,230,224,.75); padding: 2px 16px 2px 0; white-space: nowrap; vertical-align: top; width: 120px; min-width: 120px; }
.cr-value { color: rgba(232,230,224,.7); padding: 2px 0; line-height: 1.5; }
.fest-list { list-style: none; padding: 0; border-top: 0.5px solid rgba(232,230,224,.15); padding-top: 12px; }
.fest-list li { font-size: 11px; font-style: italic; color: #8285d7; padding: 3px 0; }
.empty-state { padding: 60px 0; text-align: center; }
.empty-state p { font-size: 13px; color: rgba(232,230,224,.7); letter-spacing: .06em; }

/* Nav hover pop */

/* Strip card hover pop */
.strip-card {
  transition: transform .22s ease, filter .22s ease;
}
.strip-card:hover {
  transform: scale(1.03);
  filter: brightness(1.08);
  z-index: 2;
}
/* About cta hover */
.about-cta {
  transition: color .18s, transform .18s;
  display: inline-block;
}
.about-cta:hover {
  color: #8285d7 !important;
  transform: translateX(3px);
}
/* Play btn already has hover — ensure pointer */
.play-btn { cursor: pointer; }
/* Showreel player above everything */
#showreel-player { z-index: 20; }

.footer-reg { font-size: 9px; letter-spacing: .06em; color: rgba(232,230,224,.2); }

/* Parallax poster */
.film-poster-wrap { overflow: hidden; position: relative; height: 203px; }
.film-poster-wrap img { position: absolute; top: -25%; left: 0; width: 100%; height: 150%; object-fit: cover; will-change: transform; filter: brightness(.82) saturate(.88); transition: filter .25s; }
.film-poster-wrap:hover img { filter: brightness(.6) saturate(.7); }

#sticky-logo-films { opacity: 0; transition: opacity .35s ease; pointer-events: none; display: block; line-height: 0; flex-shrink: 0; margin-left: auto; }
#sticky-logo-films img { height: 28px; width: auto; display: block; }
#sticky-logo-films.visible { opacity: 1; pointer-events: auto; }



/* ── Navigation — Space Grotesk ── */



html { scroll-behavior: smooth; }
.film-card[id] { scroll-margin-top: 80px; }
@media (max-width: 680px) {
  .nav { padding: 12px 20px; flex-wrap: wrap; justify-content: space-between; }
  .nav-toggle { display: flex; margin-left: auto; }
  .nav-links { display: none; flex-direction: column; gap: 0; width: 100%; border-top: 0.5px solid rgba(232,230,224,.08); padding-top: 8px; }
  .nav-links.open { display: flex; }
  .nav-links a { font-size: 18px; padding: 7px 0; border-bottom: none; border-bottom-color: transparent; color: rgba(255,255,255,.55); width: 100%; }
  .nav-links a.active { color: rgba(255,255,255,.92); border-bottom: none; }
  .nav-home { display: block; }
  .film-card { display: flex; flex-direction: column; gap: 20px; }
  .film-media { width: 100%; }
  .media-slot { width: 100%; height: auto; aspect-ratio: 16/9; }
  .film-poster-wrap { width: 100%; height: auto; aspect-ratio: 16/9; }
  .film-poster-wrap img { position: relative; top: auto; width: 100%; height: 100%; object-fit: cover; }
  .footer { flex-direction: column; gap: 12px; padding: 20px; text-align: center; }
  /* FIX: tabs use grid on mobile — logo stays row 1 right, sticky preserved */
  .tabs { display: grid; grid-template-columns: auto auto 1fr auto; align-items: center; padding: 10px 20px; gap: 4px; }
  .tab-btn:nth-child(1) { grid-column: 1; }
  .tab-btn:nth-child(2) { grid-column: 2; }
  .tab-btn:nth-child(3) { grid-column: 1; grid-row: 2; }
  #sticky-logo-films { grid-column: 4; grid-row: 1; justify-self: end; }
  /* FIX: film body text left-aligned under the image, not centered */
  .film-body { padding: 0; text-align: left; }
  .cr-label { width: 100px; min-width: 100px; }
  /* FIX: credits table — stack label/value on mobile */
  .film-credits { display: block; }
  .film-credits tr { display: flex; flex-direction: column; margin-bottom: 8px; }
  .film-credits td { display: block; padding: 0; white-space: normal; }
  .cr-label { color: rgba(232,230,224,.45); font-size: 9px; letter-spacing: .1em; margin-bottom: 1px; }
  .cr-value { color: rgba(232,230,224,.8); font-size: 12px; }
  .films-list { padding: 16px 20px 60px; }
  .video-slot { width: 100%; height: auto; aspect-ratio: 16/9; }
}


/* Loading state */
.loading-state { padding: 60px 0; text-align: center; color: rgba(232,230,224,.4); font-size: 12px; letter-spacing: .14em; }
</style>
</head>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────
var videoCounter = 0;

function metaLine(film, tab) {
  if (tab === 'completed') {
    return film.length + "\u2019 \u00b7 " + film.type + " \u00b7 " + film.countries + " \u00b7 " + film.year;
  } else if (tab === 'production') {
    return film.length + "\u2019 \u00b7 " + film.type + " \u00b7 " + film.countries + " \u00b7 In production \u00b7 Est. delivery " + film.est_delivery;
  } else {
    return film.type + " &nbsp;\u00b7&nbsp; " + film.countries + " &nbsp;\u00b7&nbsp; In Production &nbsp;\u00b7&nbsp; Est. delivery " + film.est_delivery;
  }
}

function creditsHTML(credits) {
  if (!credits || !credits.length) return '';
  var rows = credits.map(function(c) {
    return '<tr><td class="cr-label">' + c.label + '</td><td class="cr-value">' + c.value + '</td></tr>';
  }).join('');
  return '<table class="film-credits">' + rows + '</table>';
}

function festivalsHTML(festivals) {
  if (!festivals || !festivals.length) return '';
  var items = festivals.map(function(f) {
    return '<li>' + f + '</li>';
  }).join('');
  return '<ul class="fest-list">' + items + '</ul>';
}

function filmCardCompleted(film) {
  videoCounter++;
  var idx = videoCounter;
  var videoUrl = '';
  if (film.vimeo_id) videoUrl = 'https://player.vimeo.com/video/' + film.vimeo_id + '?autoplay=1';
  else if (film.youtube_id) videoUrl = 'https://www.youtube.com/embed/' + film.youtube_id + '?autoplay=1';
  var label = film.trailer_label || 'Watch trailer';
  var filmId = film.id || ('film-' + idx);

  return '<div class="film-card" id="' + filmId + '">' +
    '<div class="film-media">' +
      '<div class="media-slot film-poster-wrap" id="still-' + idx + '" onclick="showVideo(' + idx + ')">' +
        '<img src="' + (film._imgSrc || '') + '" alt="' + (film.image_alt || '') + '"/>' +
        '<div class="play-overlay"><div class="play-circle"><div class="play-tri-sm"></div></div></div>' +
      '</div>' +
      '<div class="video-slot" id="video-' + idx + '">' +
        '<iframe src="" data-src="' + videoUrl + '" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>' +
      '</div>' +
      '<div class="media-label" id="label-' + idx + '" data-orig="' + label + '">&#9654; ' + label + '</div>' +
    '</div>' +
    '<div class="film-body">' +
      '<div class="film-meta-line">' + metaLine(film, 'completed') + '</div>' +
      '<h2 class="film-title">' + film.title + '</h2>' +
      '<p class="film-synopsis">' + (film.synopsis || '') + '</p>' +
      creditsHTML(film.credits) +
      festivalsHTML(film.festivals) +
    '</div>' +
  '</div>';
}

function filmCardProduction(film) {
  var filmId = film.id || ('film-p-' + videoCounter);
  return '<div class="film-card" id="' + filmId + '">' +
    '<div class="film-media">' +
      '<div class="media-slot film-poster-wrap" style="cursor:default;">' +
        '<img src="' + (film._imgSrc || '') + '" alt="' + (film.image_alt || '') + '"/>' +
      '</div>' +
    '</div>' +
    '<div class="film-body">' +
      '<div class="film-meta-line">' + metaLine(film, 'production') + '</div>' +
      '<h2 class="film-title">' + film.title + '</h2>' +
      '<p class="film-synopsis">' + (film.synopsis || '') + '</p>' +
      creditsHTML(film.credits) +
    '</div>' +
  '</div>';
}

function filmCardDevelopment(film) {
  var filmId = film.id || ('film-d-' + videoCounter);
  return '<div class="film-card" id="' + filmId + '">' +
    '<div class="film-media">' +
      '<div class="media-slot film-poster-wrap" style="cursor:default;">' +
        '<img src="' + (film._imgSrc || '') + '" alt="' + (film.image_alt || '') + '"/>' +
      '</div>' +
    '</div>' +
    '<div class="film-body">' +
      '<div class="film-meta-line">' + metaLine(film, 'development') + '</div>' +
      '<h2 class="film-title">' + film.title + '</h2>' +
      creditsHTML(film.credits) +
    '</div>' +
  '</div>';
}

// ── Image map — built from baked-in images ────────────────────────────────
// We keep images baked in (as a JS object) so they load fast
// and don't require extra network requests
var IMAGE_MAP = {};

function loadImages() {
  // Images are stored in the /images/ folder
  // Map alt text to image filename
  var altToFile = {
    'Pirateland still': 'images/pirateland-still.jpg',
    'Panellinion still': 'images/panellinion-still.jpg',
    'End of August still': 'images/end-of-august-still.jpg',
    'Microbiome still': 'images/microbiome-still.jpg',
    'Homes still': 'images/homes-still.jpg',
    'X Apartments still': 'images/x-apartments-still.jpg',
    'I am a Dancer still': 'images/i-am-a-dancer-still.jpg',
    'Magnifier still': 'images/magnifier-still.jpg',
    'Pirateland feature still': 'images/pirateland-feature-still.jpg',
    'Cherrybrain still': 'images/cherrybrain-still.jpg',
    'UFO still': 'images/ufo-still.png'
  };
  return altToFile;
}

// ── Main: fetch JSON and render ───────────────────────────────────────────
fetch('/content/films.json?v=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var imgMap = loadImages();

    // Attach image sources to film objects
    function attachImg(film) {
      film._imgSrc = imgMap[film.image_alt] || '';
      return film;
    }

    // Render completed
    var completedHTML = (data.completed || []).map(function(f) {
      return filmCardCompleted(attachImg(f));
    }).join('');
    document.getElementById('panel-completed').innerHTML = completedHTML || '<div class="empty-state"><p>No films yet</p></div>';

    // Render in production
    var productionHTML = (data.in_production || []).map(function(f) {
      return filmCardProduction(attachImg(f));
    }).join('');
    document.getElementById('panel-production').innerHTML = productionHTML || '<div class="empty-state"><p>No films yet</p></div>';

    // Render in development
    var devHTML = (data.in_development || []).map(function(f) {
      return filmCardDevelopment(attachImg(f));
    }).join('');
    document.getElementById('panel-development').innerHTML = devHTML || '<div class="empty-state"><p>No films yet</p></div>';

    // Init parallax after render
    initParallax();

    // Scroll to anchor if present in URL (e.g. films.html#pirateland)
    var hash = window.location.hash;
    if (hash) {
      // Small delay to let the DOM settle after render
      setTimeout(function() {
        var target = document.querySelector(hash);
        if (target) {
          // Switch to correct tab first
          var panel = target.closest('.tab-panel');
          if (panel) {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
            panel.classList.add('active');
            var tabId = panel.id.replace('panel-', '');
            var btn = document.querySelector('[data-tab="' + tabId + '"]');
            if (btn) btn.classList.add('active');
          }
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 100);
    }
  })
  .catch(function(err) {
    console.error('Failed to load films.json:', err);
  });

// ── Video player ──────────────────────────────────────────────────────────
function showVideo(id) {
  var s = document.getElementById('still-' + id);
  var v = document.getElementById('video-' + id);
  var l = document.getElementById('label-' + id);
  var f = v.querySelector('iframe');
  f.src = f.dataset.src;
  s.classList.add('hidden');
  v.classList.add('visible');
  l.innerHTML = '&#10005; Close';
  l.classList.add('active-label');
  l.onclick = function() { closeVideo(id); };
}

function closeVideo(id) {
  var s = document.getElementById('still-' + id);
  var v = document.getElementById('video-' + id);
  var l = document.getElementById('label-' + id);
  var f = v.querySelector('iframe');
  f.src = '';
  s.classList.remove('hidden');
  v.classList.remove('visible');
  var orig = l.dataset.orig || 'Watch trailer';
  l.innerHTML = '&#9654; ' + orig;
  l.classList.remove('active-label');
  l.onclick = function() { showVideo(id); };
}

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Nav toggle ────────────────────────────────────────────────────────────
document.querySelector('.nav-toggle').addEventListener('click', function() {
  document.querySelector('.nav-links').classList.toggle('open');
});

// ── Sticky logo ───────────────────────────────────────────────────────────
(function() {
  var logo = document.getElementById('sticky-logo-films');
  var sentinel = document.querySelector('.page-header');
  function check() {
    var r = sentinel.getBoundingClientRect();
    if (r.bottom < 0) { logo.classList.add('visible'); }
    else { logo.classList.remove('visible'); }
  }
  window.addEventListener('scroll', check, {passive: true});
})();

// ── Parallax posters ──────────────────────────────────────────────────────
function initParallax() {
  function tick() {
    var vh = window.innerHeight;
    document.querySelectorAll('.film-poster-wrap').forEach(function(w) {
      var img = w.querySelector('img');
      if (!img) return;
      var r = w.getBoundingClientRect();
      if (r.bottom < 0 || r.top > vh) return;
      var p = (vh - r.top) / (vh + r.height);
      p = Math.max(0, Math.min(1, p));
      img.style.top = (-25 + (50 * (1 - p))) + '%';
    });
  }
  window.addEventListener('scroll', tick, {passive: true});
}
</script>
