backend:
  name: github
  repo: mmottekk/alaskafilms.gr
  branch: main

media_folder: images
public_folder: images

collections:
  - name: films_completed
    label: "Films — Completed"
    label_singular: "Completed Film"
    files:
      - name: films
        label: "All Films"
        file: content/films.json
        fields:
          - label: "Completed Films"
            name: completed
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Type, name: type, widget: string, hint: "e.g. Short fiction, Documentary" }
              - { label: "Length (minutes)", name: length, widget: string }
              - { label: Countries, name: countries, widget: string }
              - { label: Year, name: year, widget: string }
              - { label: Synopsis, name: synopsis, widget: text }
              - label: Credits
                name: credits
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Value, name: value, widget: string }
              - label: Festivals
                name: festivals
                widget: list
                field: { label: Entry, name: festival, widget: string }
              - { label: "Vimeo ID", name: vimeo_id, widget: string, required: false }
              - { label: "YouTube ID", name: youtube_id, widget: string, required: false }
              - { label: "Trailer label", name: trailer_label, widget: string, default: "Watch trailer" }
              - { label: "Image alt text", name: image_alt, widget: string }
          - label: "In Production Films"
            name: in_production
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Type, name: type, widget: string }
              - { label: "Length (minutes)", name: length, widget: string }
              - { label: Countries, name: countries, widget: string }
              - { label: "Est. Delivery", name: est_delivery, widget: string }
              - { label: Synopsis, name: synopsis, widget: text }
              - label: Credits
                name: credits
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Value, name: value, widget: string }
              - { label: "Image alt text", name: image_alt, widget: string }
          - label: "In Development Films"
            name: in_development
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Type, name: type, widget: string }
              - { label: Countries, name: countries, widget: string }
              - { label: "Est. Delivery", name: est_delivery, widget: string }
              - label: Credits
                name: credits
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Value, name: value, widget: string }
              - { label: "Image alt text", name: image_alt, widget: string }

  - name: commercial
    label: "Commercial & Cultural"
    files:
      - name: commercial
        label: Videos
        file: content/commercial.json
        fields:
          - label: Videos
            name: videos
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: "Vimeo ID", name: vimeo_id, widget: string, required: false }
              - { label: "YouTube ID", name: youtube_id, widget: string, required: false }

  - name: homepage
    label: Homepage
    files:
      - name: homepage
        label: Homepage Content
        file: content/homepage.json
        fields:
          - label: "Hero Slides"
            name: hero_slides
            widget: list
            summary: "{{fields.caption_title}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: "Film title", name: caption_title, widget: string }
              - { label: "By line", name: caption_by, widget: string }
              - { label: "Image path", name: image, widget: string }
              - { label: "Object position", name: object_position, widget: string, default: "center center" }
              - { label: "Active (first slide only)", name: active, widget: boolean, default: false }
          - label: "Strip Cards"
            name: strip_cards
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Category, name: category, widget: string }
              - { label: Meta, name: meta, widget: string }
              - { label: "Image path", name: image, widget: string }
              - { label: Link, name: link, widget: string }
              - { label: Narrow, name: narrow, widget: boolean, default: false }
