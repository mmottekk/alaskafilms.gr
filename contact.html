* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #212124; color: #e8e6e0; font-family: system-ui, sans-serif; }
a { text-decoration: none; }






.footer { padding: 22px 36px; display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid rgba(232,230,224,.15); }
.footer-copy { font-size: 10px; color: rgba(232,230,224,.8); letter-spacing: .08em; }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 10px; letter-spacing: .1em; color: rgba(232,230,224,.7); }


.contact-outer { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
.contact-inner { text-align: center; }
.page-title { font-family: Georgia, serif; font-size: 28px; font-weight: 400; font-style: italic; color: #e8e6e0; margin-bottom: 48px; }
.contact-item { margin-bottom: 28px; }
.contact-label { font-size: 9px; letter-spacing: .22em; color: rgba(232,230,224,.7); margin-bottom: 6px; }
.contact-value { font-size: 15px; color: rgba(232,230,224,.75); letter-spacing: .02em; line-height: 1.7; }
.contact-value a { color: rgba(232,230,224,.75); border-bottom: 0.5px solid rgba(232,230,224,.8); padding-bottom: 1px; }
.contact-value a:hover { color: #8285d7; border-color: #8285d7; }
.contact-divider { width: 32px; height: 0.5px; background: rgba(232,230,224,.15); margin: 0 auto 28px; }

/* Strip card hover pop */
.strip-card {
  transition: transform .22s ease, filter .22s ease;
}
.strip-card:hover {
  transform: scale(1.03);
  filter: brightness(1.08);
  z-index: 2;
}
/* About cta hover */
.about-cta {
  transition: color .18s, transform .18s;
  display: inline-block;
}
.about-cta:hover {
  color: #8285d7 !important;
  transform: translateX(3px);
}
/* Play btn already has hover — ensure pointer */
.play-btn { cursor: pointer; }
/* Showreel player above everything */
#showreel-player { z-index: 20; }


.footer-reg { font-size: 9px; letter-spacing: .06em; color: rgba(232,230,224,.2); }

.contact-value a { color: inherit; text-decoration: none; }
.contact-value a:hover { color: #fff; }


body { min-height: 100vh; display: flex; flex-direction: column; }
